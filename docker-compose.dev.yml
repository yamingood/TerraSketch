version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: terrasketch_dev
      POSTGRES_USER: terrasketch
      POSTGRES_PASSWORD: terrasketch123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U terrasketch"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Optionnel : Base pour le backend Django
  backend:
    build: 
      context: ./terrasketch
      dockerfile: Dockerfile.dev
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.local
      - DB_HOST=postgres
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./terrasketch:/app
    command: python manage.py runserver 0.0.0.0:8000

volumes:
  postgres_data:
  redis_data: